<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/favicon.svg" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Theme color (dark by default) -->
    <meta name="theme-color" content="#0B0F1A" />

    <!-- Primary meta -->
    <title>Brice Ngantou - Développeur Full Stack & Mobile</title>
    <meta
      name="description"
      content="Portfolio de Brice Ngantou, Ingénieur Full Stack & Mobile basé en Île-de-France. Spécialisé React, Node.js, Flutter, DevOps et IA."
    />
    <meta name="author" content="Brice Ngantou" />
    <meta
      name="keywords"
      content="Brice Ngantou, développeur full stack, développeur mobile, React, Node.js, Flutter, TypeScript, DevOps, IA, Île-de-France"
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Brice Ngantou - Développeur Full Stack & Mobile" />
    <meta
      property="og:description"
      content="Ingénieur Full Stack & Mobile - React, Node.js, Flutter, DevOps, IA. Basé en Île-de-France."
    />
    <meta property="og:image" content="%PUBLIC_URL%/og-image.png" />
    <meta property="og:locale" content="fr_FR" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Brice Ngantou - Développeur Full Stack & Mobile" />
    <meta
      name="twitter:description"
      content="Ingénieur Full Stack & Mobile - React, Node.js, Flutter, DevOps, IA."
    />
    <meta name="twitter:image" content="%PUBLIC_URL%/og-image.png" />

    <!-- PWA manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Preconnect fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Rubik:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <noscript>Vous devez activer JavaScript pour utiliser cette application.</noscript>
    <div id="root"></div>
  </body>
</html>
